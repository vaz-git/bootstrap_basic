<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botões Bootstrap</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap ícones -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

</head>
<body>


    <!-- 1ª Digitação (Aqui) -->
     <div class="container d-flex justify-content-center mt-3">
        <button class="btn btn-primary ms-4">Primario</button>
        <button class="btn btn-secondary ms-4">Secundario</button>
        <button class="btn btn-success ms-4">Sucesso</button>
        <button class="btn btn-danger ms-4">Perigo</button>
        <button class="btn btn-warning ms-4">Alerta</button>
        <button class="btn btn-info ms-4">Info</button>
     </div>

     <div class="container d-flex justify-content-center mt-5">
        <!-- Botão com icone -->
        <button class="btn btn-primary">
            <i class="bi bi-search"></i> Pesquisar
        </button>
        
        <!-- Botão com icone -->
        <button class="btn btn-danger ms-2">
            <i class="bi bi-trash"></i>
        </button>
     </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
