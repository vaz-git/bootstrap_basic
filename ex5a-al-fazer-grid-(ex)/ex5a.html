<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cards Bootstrap</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<div class="container mt-5">

                    <p class="card-text">Um pequeno exemplo de card feito com bootstrap.</p>
                    <h5 class="card-title">Card 1</h5>
                    <a class="btn btn-primary" href="#">Acessar</a>
                </div>
            </div>
        </div>

        <div class="col-md-4 col-12">
            <div class="card">
                <div class="card-body">
                    <p class="card-text">Outro card mostrando como funciona a grid.</p>
                    <h5 class="card-title">Card 2</h5>
                    <a class="btn btn-primary" href="#">Acessar</a>
                </div>
            </div>
        </div>

        <div class="col-md-4 col-12">
            <div class="card">
                <div class="card-body">
                    <p class="card-text">Os elementos ficam organizados automaticamente.</p>
                    <h5 class="card-title">Card 3</h5>
                    <a class="btn btn-primary" href="#">Acessar</a>
                </div>
            </div>
        </div>

    </div>

</div>

</html>
