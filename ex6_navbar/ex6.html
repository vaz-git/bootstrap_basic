<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Navbar Bootstrap</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Bootstrap ícones -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />
  </head>

  <body>
    <!-- 1ª Digitação (Aqui) -->
    <nav class="navbar navbar-expand-lg navbar-light bg-dark">
        <div class="container">
          <a class="navbar-brand" href="#">
            <i class="bi bi-bootstrap-fill text-light"></i>
          </a>

          <button class="navbar-toggler bg-light" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
             <span class="navbar-toggler-icon"></span>
          </button>

        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav">
            <li>
                <a class="nav-link active text-light" href="#">Home</a>
            </li>
            <li>
                <a class="nav-link text-light" href="#">Sobre</a>
            </li>
            <li>
                <a class="nav-link text-light" href="#">Contatos</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <nav class="navbar navbar-expand-lg navbar-light bg-primary mt-5">
        <div class="container">
            <a class="navbar-brand" href="#">
            <i class="bi bi-bootstrap-fill">MeuSite</i>
            </a>

            <div class="navbar-nav">
                <a class="nav-link"  href="#"><i class="bi bi-house"></i>Home</a>
                <a class="nav-link"  href="#"><i class="bi bi-person"></i>Perfil</a>
                <a class="nav-link"  href="#"><i class="bi bi-envelope"></i>Mensagens</a>
            </div>
        </div>
    </nav>

    <nav class="navbar navbar-expand-lg navbar-light bg-secondary mt-5">
        <div class="container">
            <a class="navbar-brand" href="#">
            <i class="bi bi-bootstrap-fill">MeuSite</i>
            </a>

            <div class="navbar-nav">
                <a class="nav-link"  href="#"><i class="bi bi-house-heart"></i>Home</a>
                <a class="nav-link"  href="#"><i class="bi bi-person-square"></i>Perfil</a>
                <a class="nav-link"  href="#"><i class="bi bi-chat-left-dots-fill"></i>Mensagens</a>
            </div>
        </div>
    </nav>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
